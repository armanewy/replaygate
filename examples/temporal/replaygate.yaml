project:
  name: replay-gate-examples
  engine: temporal

verification:
  workflow_types:
    - PaymentWorkflow
    - RefundWorkflow
  history_sources:
    - type: filesystem
      path: ./histories
      glob: "payment_history.json"
    - type: filesystem
      path: ./histories
      glob: "refund_history.json"
  selection:
    max_histories: 50
    strategy: all
  outputs:
    json: ./artifacts/report.json
    markdown: ./artifacts/report.md
    html: ./artifacts/report.html

policy:
  fail_on:
    - nondeterminism
    - unknown_workflow_type
    - adapter_error
  max_unknown: 0
  max_failures: 0

privacy:
  redact_payloads_in_reports: true

temporal:
  import_mode: local_module
  workflows_module: examples.temporal.workflows_breaking
  payload_codec: none
