name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,temporal]"
      - name: Ruff
        run: python -m ruff check replaygate tests examples
      - name: Pytest
        run: python -m pytest
      - name: Sample pass verification
        run: python -m replaygate.cli verify --config examples/temporal/replaygate.pass.yaml
      - name: Publish Replay Gate summary
        if: always()
        run: cat examples/temporal/artifacts/report.pass.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Replay Gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-gate-sample-pass
          path: examples/temporal/artifacts/

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/replay-gate
        with:
          config: examples/temporal/replaygate.pass.yaml
      - name: Publish Replay Gate summary
        if: always()
        run: cat examples/temporal/artifacts/report.pass.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Replay Gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-gate-action-smoke
          path: examples/temporal/artifacts/
